<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Зарплата</title>
    <style>
        :root { --bg: #121212; --surface: #1e1e1e; --primary: #03dac6; --secondary: #bb86fc; --text: #ffffff; --danger: #cf6679; --warning: #f1c40f; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .screen { display: none; }
        .screen.active { display: block; }
        button { display: block; width: 100%; padding: 15px; margin-bottom: 10px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; background: var(--surface); color: var(--primary); }
        button.action { background: var(--primary); color: #000; }
        button.callout { background: var(--secondary); color: #000; }
        button.danger { background: var(--danger); color: #000; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; box-sizing: border-box; }
        input[type="date"] { color-scheme: dark; }
        .card { background: var(--surface); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .header { font-size: 20px; font-weight: bold; margin-bottom: 20px; text-align: center; color: var(--primary); }
        hr { border: 0; border-top: 1px solid #333; margin: 15px 0; }
        .shift-history { background: #2a2a2a; padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 14px; border-left: 4px solid var(--primary); }
        .shift-history.callout { border-left: 4px solid var(--secondary); }
        .shift-history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .btn-group { display: flex; gap: 5px; }
        .btn-small { width: 40px; padding: 5px; margin: 0; color: #000; font-size: 12px; border-radius: 4px; text-align: center; }
        .btn-del { background: var(--danger); color: #fff; }
        .btn-edit { background: var(--warning); }
    </style>
</head>
<body>

    <!-- ГОЛОВНЕ МЕНЮ -->
    <div id="screen-menu" class="screen active">
        <div class="header">Розрахунок ЗП</div>
        <div class="card" id="menu-stats">Відпрацьовано змін: 0</div>
        <button class="action" onclick="openShiftScreen()">➕ Додати зміну</button>
        <button class="callout" onclick="openCalloutScreen()">🚨 Вихід на вихідному</button>
        <button onclick="nav('screen-summary'); calcSummary();">🧮 Підсумок та Історія</button>
        <button onclick="nav('screen-settings'); loadSettings();">⚙️ Налаштування</button>
        <button onclick="exportData()">💾 Зберегти бекап</button>
        <button onclick="document.getElementById('import-file').click()">📂 Завантажити бекап</button>
        <input type="file" id="import-file" style="display:none" onchange="importData(event)" accept=".json">
        <button class="danger" onclick="resetMonth()">🗑 Скинути місяць</button>
    </div>

    <!-- НАЛАШТУВАННЯ -->
    <div id="screen-settings" class="screen">
        <div class="header">Налаштування</div>
        <label>Базова ЗП за норму:</label>
        <input type="number" id="set-base" placeholder="25000">
        <label>Норма змін:</label>
        <input type="number" id="set-norm" placeholder="8">
        <label>Тариф ПР (грн/год):</label>
        <input type="number" id="set-pr-rate" placeholder="150">
        <label>Відсоток податку/зборів (%):</label>
        <input type="number" id="set-tax-percent" step="0.1" placeholder="19.5">
        <label>Фіксовані утримання (грн/місяць):</label>
        <input type="number" id="set-deduction" placeholder="0">
        
        <button class="action" onclick="saveSettings()">Зберегти</button>
        <button onclick="nav('screen-menu')">Скасувати</button>
    </div>

    <!-- ДОДАТИ/РЕДАГУВАТИ ВИХІДНИЙ -->
    <div id="screen-callout" class="screen">
        <div class="header" id="callout-header" style="color: var(--secondary);">Вихід поза зміною</div>
        <label>Дата виходу:</label>
        <input type="date" id="callout-date">
        <label>Сума доплати за цей вихід (грн):</label>
        <input type="number" id="callout-amount" placeholder="Наприклад: 1500">
        <button class="callout" onclick="saveCallout()">💾 Зберегти вихід</button>
        <button onclick="nav('screen-menu')">Скасувати</button>
    </div>

    <!-- ДОДАТИ/РЕДАГУВАТИ ЗМІНУ: ПР -->
    <div id="screen-pr" class="screen">
        <div class="header" id="shift-header">Крок 1: Дата та ПР</div>
        <label>Дата зміни:</label>
        <input type="date" id="shift-date">
        <label>Хвилин ПР (можна через +, напр. 15+30):</label>
        <input type="text" inputmode="tel" id="shift-pr" placeholder="0">
        <button class="action" onclick="startExtras()">Далі ➡️</button>
        <button onclick="nav('screen-menu')">Скасувати</button>
    </div>

    <!-- ДОДАТИ/РЕДАГУВАТИ ЗМІНУ: ДОПИ -->
    <div id="screen-extras" class="screen">
        <div class="header">Крок 2: Доп. активності</div>
        <div id="current-extras-list" class="card" style="display:none;"></div>
        
        <label>Назва (напр. Сітки):</label>
        <input type="text" id="extra-name">
        <label>Сума (грн):</label>
        <input type="number" id="extra-amount">
        
        <button onclick="addExtraToShift()">➕ Додати цей доп</button>
        <hr>
        <button class="action" onclick="saveShift()">💾 Зберегти зміну</button>
        <button onclick="nav('screen-menu')">Скасувати</button>
    </div>

    <!-- ПІДСУМОК -->
    <div id="screen-summary" class="screen">
        <div class="header">Підсумок за місяць</div>
        <div class="card">
            <label>Чи були аварії (мінус премія)?</label>
            <select id="sum-emergency" onchange="calcSummary()">
                <option value="no">Ні (Премія є)</option>
                <option value="yes">Так (Без премії)</option>
            </select>
        </div>
        <div class="card" id="summary-result"></div>
        <button class="action" onclick="nav('screen-menu')">На головну</button>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('zp_data')) || {};
    
    // Міграція та дефолти
    if (typeof db.base_monthly === 'undefined') db.base_monthly = 25000;
    if (typeof db.norm_shifts === 'undefined') db.norm_shifts = 8;
    if (typeof db.pr_rate === 'undefined') db.pr_rate = 150;
    if (typeof db.tax_percent === 'undefined') db.tax_percent = (db.is_official !== false) ? 19.5 : 0;
    if (typeof db.fixed_deduction === 'undefined') db.fixed_deduction = 0;
    if (typeof db.shifts === 'undefined') db.shifts = [];
    if (typeof db.call_outs === 'undefined') db.call_outs = [];

    let currentShift = { date: '', pr_minutes: 0, extras: [] };
    let editShiftIndex = -1;
    let editCalloutIndex = -1;

    const BONUS = 2000;

    function saveDB() {
        localStorage.setItem('zp_data', JSON.stringify(db));
        updateMenuStats();
    }

    function nav(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if (screenId === 'screen-menu') updateMenuStats();
    }

    function updateMenuStats() {
        let calls = db.call_outs.length;
        document.getElementById('menu-stats').innerText = `Змін: ${db.shifts.length} (Норма: ${db.norm_shifts})\nПоза зміною: ${calls}`;
    }

    function loadSettings() {
        document.getElementById('set-base').value = db.base_monthly;
        document.getElementById('set-norm').value = db.norm_shifts;
        document.getElementById('set-pr-rate').value = db.pr_rate;
        document.getElementById('set-tax-percent').value = db.tax_percent;
        document.getElementById('set-deduction').value = db.fixed_deduction;
    }

    function saveSettings() {
        db.base_monthly = parseFloat(document.getElementById('set-base').value) || 0;
        db.norm_shifts = parseInt(document.getElementById('set-norm').value) || 1;
        db.pr_rate = parseFloat(document.getElementById('set-pr-rate').value) || 0;
        db.tax_percent = parseFloat(document.getElementById('set-tax-percent').value) || 0;
        db.fixed_deduction = parseFloat(document.getElementById('set-deduction').value) || 0;
        saveDB();
        nav('screen-menu');
    }

    // ВИКЛИКИ
    function openCalloutScreen() {
        editCalloutIndex = -1;
        document.getElementById('callout-header').innerText = "Вихід поза зміною";
        document.getElementById('callout-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('callout-amount').value = '';
        nav('screen-callout');
    }

    function editCallout(index) {
        editCalloutIndex = index;
        let c = db.call_outs[index];
        document.getElementById('callout-header').innerText = "Редагування виходу";
        document.getElementById('callout-date').value = c.date || '';
        document.getElementById('callout-amount').value = c.amount || '';
        nav('screen-callout');
    }

    function saveCallout() {
        let amount = parseFloat(document.getElementById('callout-amount').value) || 0;
        if (amount <= 0) return alert("Введи коректну суму.");
        
        let newCallout = {
            date: document.getElementById('callout-date').value,
            amount: amount
        };

        if (editCalloutIndex > -1) {
            db.call_outs[editCalloutIndex] = newCallout;
            editCalloutIndex = -1;
        } else {
            db.call_outs.push(newCallout);
        }
        
        saveDB();
        
        // Якщо зберігали під час перегляду підсумків, повертаємось туди
        if (document.getElementById('screen-summary').classList.contains('was-active')) {
             calcSummary();
             nav('screen-summary');
        } else {
             nav('screen-menu');
        }
    }

    function deleteCallout(index) {
        if (confirm("Точно видалити цей виклик?")) {
            db.call_outs.splice(index, 1);
            saveDB();
            calcSummary(); 
        }
    }

    // ЗМІНИ
    function openShiftScreen() {
        editShiftIndex = -1;
        document.getElementById('shift-header').innerText = "Крок 1: Дата та ПР";
        document.getElementById('shift-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('shift-pr').value = '';
        currentShift = { date: '', pr_minutes: 0, extras: [] };
        nav('screen-pr');
    }

    function editShift(index) {
        editShiftIndex = index;
        let s = db.shifts[index];
        document.getElementById('shift-header').innerText = "Редагування: Дата та ПР";
        document.getElementById('shift-date').value = s.date || '';
        document.getElementById('shift-pr').value = s.pr_minutes || 0;
        
        // Копіюємо зміну, щоб не міняти оригінал до натискання "Зберегти"
        currentShift = JSON.parse(JSON.stringify(s));
        if (!currentShift.extras) currentShift.extras = [];
        
        nav('screen-pr');
    }

    function startExtras() {
        currentShift.date = document.getElementById('shift-date').value;
        let prInput = document.getElementById('shift-pr').value.replace(/\s/g, '');
        let prSum = 0;
        if (prInput) {
            prInput.split('+').forEach(num => {
                prSum += parseInt(num) || 0;
            });
        }
        currentShift.pr_minutes = prSum;
        
        renderCurrentExtras();
        document.getElementById('extra-name').value = '';
        document.getElementById('extra-amount').value = '';
        nav('screen-extras');
    }

    function addExtraToShift() {
        let name = document.getElementById('extra-name').value.trim();
        let amount = parseFloat(document.getElementById('extra-amount').value) || 0;
        if (!name || amount <= 0) return alert("Введи нормальну назву та суму.");
        
        currentShift.extras.push({ name, amount });
        document.getElementById('extra-name').value = '';
        document.getElementById('extra-amount').value = '';
        renderCurrentExtras();
    }

    function renderCurrentExtras() {
        let list = document.getElementById('current-extras-list');
        if (currentShift.extras.length === 0) {
            list.style.display = 'none';
        } else {
            list.style.display = 'block';
            list.innerHTML = currentShift.extras.map((e, i) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>${e.name}: ${e.amount} грн</span>
                    <button class="btn-small btn-del" onclick="removeExtra(${i})">❌</button>
                </div>
            `).join('');
        }
    }

    function removeExtra(index) {
        currentShift.extras.splice(index, 1);
        renderCurrentExtras();
    }

    function saveShift() {
        if (editShiftIndex > -1) {
            db.shifts[editShiftIndex] = JSON.parse(JSON.stringify(currentShift));
            editShiftIndex = -1;
        } else {
            db.shifts.push(JSON.parse(JSON.stringify(currentShift)));
        }
        
        saveDB();
        nav('screen-menu');
    }

    function deleteShift(index) {
        if (confirm("Точно видалити цю зміну?")) {
            db.shifts.splice(index, 1);
            saveDB();
            calcSummary();
        }
    }

    // ПІДСУМОК
    function calcSummary() {
        let actual_shifts = db.shifts.length;
        let emergency = document.getElementById('sum-emergency').value === 'yes';
        let total_pr_mins = 0;
        let total_extras = 0;
        let total_callouts = 0;

        let historyHTML = "<hr><div style='color: var(--primary); font-weight: bold; margin-bottom: 10px;'>📅 Історія змін:</div>";

        // Рендер звичайних змін
        db.shifts.forEach((s, index) => {
            let pr = s.pr_minutes || 0;
            let extSum = 0;
            let extNamesArr = [];
            if (s.extras) {
                s.extras.forEach(ext => {
                    extSum += ext.amount || 0;
                    if(ext.name) extNamesArr.push(ext.name);
                });
            }
            total_pr_mins += pr;
            total_extras += extSum;

            let extText = extNamesArr.length > 0 ? `(${extNamesArr.join(', ')})` : '';
            let dateText = s.date ? s.date.split('-').reverse().join('.') : 'Без дати';

            historyHTML += `
            <div class="shift-history">
                <div class="shift-history-header">
                    <b>${dateText}</b>
                    <div class="btn-group">
                        <button class="btn-small btn-edit" onclick="editShift(${index})">✏️</button>
                        <button class="btn-small btn-del" onclick="deleteShift(${index})">❌</button>
                    </div>
                </div>
                <div>ПР: ${pr} хв | Допи: ${extSum} грн ${extText}</div>
            </div>`;
        });

        // Рендер викликів
        db.call_outs.forEach((c, index) => {
            total_callouts += c.amount || 0;
            let dateText = c.date ? c.date.split('-').reverse().join('.') : 'Без дати';
            historyHTML += `
            <div class="shift-history callout">
                <div class="shift-history-header">
                    <b style="color: var(--secondary);">${dateText} (Поза зміною)</b>
                    <div class="btn-group">
                        <button class="btn-small btn-edit" onclick="editCallout(${index})">✏️</button>
                        <button class="btn-small btn-del" onclick="deleteCallout(${index})">❌</button>
                    </div>
                </div>
                <div>Сума: ${c.amount} грн</div>
            </div>`;
        });

        let total_pr_hours = total_pr_mins / 60;
        let shift_price = db.base_monthly / db.norm_shifts;
        let actual_base = shift_price * actual_shifts;
        let actual_bonus = emergency ? 0 : BONUS;
        
        let pr_money = total_pr_hours * db.pr_rate;

        let gross = actual_base + actual_bonus + pr_money + total_extras + total_callouts;
        
        let tax_rate = db.tax_percent / 100;
        let tax_amount = gross * tax_rate;
        let deduction = db.fixed_deduction;
        
        let net = gross - tax_amount - deduction;

        document.getElementById('summary-result').innerHTML = `
            База (${actual_shifts} * ${shift_price.toFixed(0)}): <b>${actual_base.toFixed(0)} грн</b><br>
            ПР (${total_pr_hours.toFixed(2)} год * ${db.pr_rate} грн): <b>${pr_money.toFixed(0)} грн</b><br>
            Допи: <b>${total_extras.toFixed(0)} грн</b><br>
            Поза зміною: <b style="color: var(--secondary);">${total_callouts.toFixed(0)} грн</b><br>
            Премія: <b>${actual_bonus} грн</b><br>
            <hr>
            Брудними: <b>${gross.toFixed(0)} грн</b><br>
            Відсоток (${db.tax_percent}%): <b>-${tax_amount.toFixed(0)} грн</b><br>
            Утримання: <b>-${deduction.toFixed(0)} грн</b><br>
            <h3 style="margin: 10px 0 0 0; color: var(--primary);">НА РУКИ: ${net.toFixed(0)} грн</h3>
            ${db.shifts.length || db.call_outs.length ? historyHTML : 'Немає даних.'}
        `;
    }

    function resetMonth() {
        if (confirm("Точно видалити всі зміни та виклики за місяць?")) {
            db.shifts = [];
            db.call_outs = [];
            saveDB();
        }
    }

        function exportData() {
        let dataStr = JSON.stringify(db);
        let blob = new Blob([dataStr], { type: "application/json" });
        let url = URL.createObjectURL(blob);
        
        let a = document.createElement('a');
        a.href = url;
        a.download = "zp_backup.json";
        document.body.appendChild(a);
        a.click();
        
        setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }, 100);
    }


    function importData(event) {
        let file = event.target.files[0];
        if (!file) return;
        let reader = new FileReader();
        reader.onload = function(e) {
            try {
                let parsed = JSON.parse(e.target.result);
                if (typeof parsed.tax_percent === 'undefined') parsed.tax_percent = 19.5;
                if (typeof parsed.fixed_deduction === 'undefined') parsed.fixed_deduction = 0;
                if (typeof parsed.pr_rate === 'undefined') parsed.pr_rate = 150;
                if (typeof parsed.call_outs === 'undefined') parsed.call_outs = [];
                
                db = parsed;
                saveDB();
                alert("Бекап успішно завантажено!");
            } catch (err) {
                alert("Помилка читання файлу.");
            }
        };
        reader.readAsText(file);
    }

    updateMenuStats();
</script>
</body>
</html>
